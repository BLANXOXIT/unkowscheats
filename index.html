<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="sidebar">
    <h2>Yeageth</h2>
    <button onclick="showTab('user')">User</button>
    <button onclick="showTab('products')">Products</button>
    <button onclick="showTab('license')">Use Key</button>
    <button onclick="showTab('news')">News</button>
    <button onclick="showTab('social')">Social</button>
    <button onclick="showTab('referral')">Referral</button>
  </div>

  <div class="main">
    <!-- User Tab -->
    <div id="user" class="tab">
      <h2>User Profile</h2>
      <p>Welcome <span id="username">blanco</span></p>
      <p>Email: abdouthegoat06@gmail.com</p>
      <p>Status: Active</p>
      <button>Reset HWID</button>
      <button>Change Password</button>
      <button>Logout</button>
    </div>

    <!-- Products Tab -->
    <div id="products" class="tab" style="display:none;">
      <h2>Your Products</h2>
      <div class="card">CS2-ESP — ACTIVE <button>Download</button><button>UI</button></div>
      <div class="card">Valorant — ACTIVE <button>Download</button><button>UI</button></div>
      <div class="card">Marvel Rivals — ACTIVE <button>Download</button></div>
      <div class="card">Valai — ACTIVE <button>Download</button></div>
    </div>

    <!-- License Tab -->
    <div id="license" class="tab" style="display:none;">
      <h2>Redeem License</h2>
      <form id="licenseForm">
        <input type="text" id="licenseKey" placeholder="XXXXX-XXXXX-XXXXX" required>
        <button type="submit">Activate Key</button>
      </form>
      <div id="licenseStatus"></div>
    </div>

    <!-- News Tab -->
    <div id="news" class="tab" style="display:none;">
      <h2>Latest News</h2>
      <div id="newsContainer"></div>
    </div>

    <!-- Social Tab -->
    <div id="social" class="tab" style="display:none;">
      <h2>Social</h2>
      <p>Links to Discord, Twitter, etc.</p>
    </div>

    <!-- Referral Tab -->
    <div id="referral" class="tab" style="display:none;">
      <h2>Referral</h2>
      <p>Invite friends and earn rewards.</p>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
