<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>unknows cheats — Neon Dashboard</title>

  <!-- Optional web font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-dark:#050308;
      --panel:rgba(255,255,255,0.02);
      --glass-border:rgba(255,255,255,0.04);
      --neon-start:#0b0010;   /* deep black-purple */
      --neon-end:#7b2cff;     /* vivid purple */
      --muted:rgba(230,238,246,0.45);
      --text:#e6eef6;
      --shadow: 0 12px 40px rgba(2,6,23,0.75);
    }

    /* Base */
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,var(--bg-dark),#07020a);color:var(--text);-webkit-font-smoothing:antialiased}
    body{overflow:hidden;font-weight:700} /* make text bold by default */

    /* animated background (black → purple glow) */
    .bg {
      position:fixed;inset:0;z-index:-3;
      background:
        radial-gradient(600px 400px at 10% 20%, rgba(123,44,255,0.06), transparent 10%),
        radial-gradient(500px 300px at 90% 80%, rgba(11,0,16,0.06), transparent 12%),
        linear-gradient(180deg,#020007 0%, #07020a 50%, #0b0010 100%);
      animation: bgShift 14s ease-in-out infinite alternate;
      filter: blur(8px) saturate(1.05);
    }
    @keyframes bgShift { from { transform: scale(1) translateY(0) } to { transform: scale(1.03) translateY(-12px) } }

    /* subtle grid */
    .grid {
      position:fixed;inset:0;z-index:-2;opacity:0.04;
      background-image:
        linear-gradient(transparent 96%, rgba(255,255,255,0.02) 96%),
        linear-gradient(90deg, transparent 96%, rgba(255,255,255,0.02) 96%);
      background-size: 140px 140px, 140px 140px;
      mix-blend-mode: overlay;
    }

    /* App container */
    .app {
      display:flex;
      height:100vh;
      width:100vw;
      align-items:center;
      justify-content:center;
      padding:28px;
    }

    /* Login card */
    .login-screen { display:flex; align-items:center; justify-content:center; width:100%; height:100%; }
    .login-card {
      width:380px;
      padding:28px;
      border-radius:14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid var(--glass-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px) saturate(1.05);
      position:relative;
      overflow:hidden;
    }
    /* neon rim (black→purple) */
    .login-card::before{
      content:"";
      position:absolute;inset:-2px;
      background:linear-gradient(90deg,var(--neon-start),var(--neon-end));
      filter:blur(18px) saturate(1.2);
      opacity:0.9;
      z-index:-1;
      transform:scale(1.04);
      mix-blend-mode: screen;
    }

    /* Brand */
    .brand { display:flex; gap:12px; align-items:center; margin-bottom:12px; }
    .logo {
      width:48px; height:48px; border-radius:10px;
      background: linear-gradient(135deg,var(--neon-start),var(--neon-end));
      box-shadow: 0 8px 30px rgba(123,44,255,0.18), 0 0 30px rgba(123,44,255,0.12);
      display:flex;align-items:center;justify-content:center;font-weight:900;color:#0b0010;font-size:18px;
    }
    .title {
      font-size:18px;
      line-height:1;
      margin:0;
      /* text gradient black → purple */
      background: linear-gradient(180deg,#000, var(--neon-end));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight:900;
    }
    .subtitle { margin:4px 0 0; color:var(--muted); font-size:13px; font-weight:700 }

    /* Inputs */
    .field { margin-bottom:12px }
    input[type="text"], input[type="email"], input[type="password"]{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.04);
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      color:var(--text);
      font-size:14px;
      font-weight:800;
      transition: box-shadow .14s, border-color .14s, transform .08s;
      outline:none;
    }
    input::placeholder{ color: rgba(230,238,246,0.28); font-weight:700 }
    input:focus{
      box-shadow: 0 0 28px rgba(123,44,255,0.12), 0 0 18px rgba(11,0,16,0.06);
      border-color: rgba(123,44,255,0.28);
      transform: translateY(-1px);
    }

    /* Neon button (black→purple gradient) */
    .btn {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:0;
      font-weight:900;
      cursor:pointer;
      color:#0b0010;
      background: linear-gradient(90deg, #000, var(--neon-end));
      box-shadow: 0 10px 40px rgba(123,44,255,0.12), 0 0 28px rgba(123,44,255,0.14);
      transition: transform .12s, filter .12s;
    }
    .btn:hover{ transform: translateY(-3px); filter:brightness(1.05) }
    .muted { color:var(--muted); font-size:13px; margin-top:8px; text-align:center; font-weight:800 }

    /* Dashboard */
    .dashboard {
      display:flex;
      width:100%;
      height:100%;
      min-height:640px;
      border-radius:14px;
      overflow:hidden;
      box-shadow: var(--shadow);
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      border:1px solid var(--glass-border);
    }
    .sidebar {
      width:260px;
      padding:22px;
      background: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(255,255,255,0.01));
      border-right:1px solid rgba(255,255,255,0.02);
      display:flex;flex-direction:column;gap:12px;
    }
    .sidebar h2{
      margin:0;color:var(--neon-end);font-size:20px;font-weight:900;
      background: linear-gradient(180deg,#000,var(--neon-end));
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    .nav-btn {
      display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:0;background:transparent;color:var(--text);cursor:pointer;font-weight:900;
      transition: background .12s, transform .08s;
    }
    .nav-btn:hover{ background: linear-gradient(90deg, rgba(123,44,255,0.03), rgba(11,0,16,0.02)); transform: translateX(6px) }

    .main { flex:1;padding:28px;overflow:auto; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid rgba(255,255,255,0.02);
      box-shadow: 0 6px 20px rgba(2,6,23,0.6);
      font-weight:800;
    }

    .badge { display:inline-block;padding:6px 10px;border-radius:8px;background:linear-gradient(90deg,#000,var(--neon-end));color:#0b0010;font-weight:900 }

    @media (max-width:980px){
      .dashboard{flex-direction:column}
      .sidebar{width:100%;display:flex;flex-direction:row;overflow:auto}
      .sidebar nav{display:flex;gap:8px}
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="app" id="appRoot">
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen" role="dialog" aria-labelledby="loginTitle">
      <div class="login-card" role="form" aria-labelledby="loginTitle">
        <div class="brand">
          <div class="logo">UC</div>
          <div>
            <h1 class="title">unknows cheats</h1>
            <div class="subtitle">Pro access • Neon black → purple</div>
          </div>
        </div>

        <div class="field">
          <input id="loginUsername" type="text" placeholder="Username" autocomplete="username" />
        </div>
        <div class="field">
          <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" />
        </div>
        <div class="field">
          <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
        </div>

        <!-- Inline onclick ensures the button always responds even if script loading order is weird -->
        <button id="loginBtn" class="btn" onclick="
          (function(){
            var u=document.getElementById('loginUsername').value.trim();
            var e=document.getElementById('loginEmail').value.trim();
            var p=document.getElementById('loginPassword').value.trim();
            if(!u||!e||!p){ document.getElementById('loginError').textContent='Fill all fields'; return; }
            try{ localStorage.setItem('profile', JSON.stringify({username:u,email:e,status:'Active'})); }catch(err){}
            document.getElementById('loginScreen').style.display='none';
            var dash=document.getElementById('dashboard'); dash.style.display='flex'; dash.setAttribute('aria-hidden','false');
            document.getElementById('usernameDisplay').textContent=u;
            document.getElementById('emailDisplay').textContent=e;
          })();
        ">Let's go!</button>

        <div id="loginError" class="muted" aria-live="polite"></div>
      </div>
    </div>

    <!-- DASHBOARD (hidden until login) -->
    <div id="dashboard" class="dashboard" role="application" aria-hidden="true" style="display:none">
      <aside class="sidebar" role="navigation" aria-label="Main">
        <h2>unknows cheats</h2>
        <nav>
          <button class="nav-btn" data-tab="user">User</button>
          <button class="nav-btn" data-tab="products">Products</button>
          <button class="nav-btn" data-tab="license">Use Key</button>
          <button class="nav-btn" data-tab="news">News</button>
        </nav>
        <div style="flex:1"></div>
        <div style="font-size:12px;color:var(--muted)">Neon theme • Local demo</div>
      </aside>

      <main class="main" role="main">
        <section id="user" class="tab">
          <h2>User Profile <span class="badge" id="statusBadge">Active</span></h2>
          <div class="card">
            <p><strong>Welcome</strong> <span id="usernameDisplay">—</span></p>
            <p><strong>Email</strong> <span id="emailDisplay">—</span></p>
            <div style="margin-top:12px;display:flex;gap:8px">
              <button id="logoutBtn" class="btn" style="background:linear-gradient(90deg,var(--neon-end),#000);color:#fff">Logout</button>
              <button id="importDemo" class="btn" style="background:linear-gradient(90deg,#000,var(--neon-end));color:#0b0010">Import Demo</button>
            </div>
          </div>
        </section>

        <section id="products" class="tab" style="display:none">
          <h2>Your Products</h2>
          <div id="productsContainer" class="card">No products yet.</div>
        </section>

        <section id="license" class="tab" style="display:none">
          <h2>Redeem License</h2>
          <form id="licenseForm" class="card" autocomplete="off">
            <input id="licenseKey" type="text" placeholder="XXXXX-XXXXX-XXXXX" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:var(--text);font-weight:800" />
            <div style="margin-top:12px;display:flex;gap:8px">
              <button type="submit" class="btn" style="flex:1">Activate Key</button>
              <button type="button" id="clearDataBtn" class="btn" style="background:linear-gradient(90deg,#2b002b,var(--neon-end));color:#fff">Clear Data</button>
            </div>
            <div id="licenseStatus" class="muted" style="margin-top:10px"></div>
          </form>
          <div class="card"><h3>My Licenses</h3><div id="myLicenses">No licenses yet.</div></div>
        </section>

        <section id="news" class="tab" style="display:none">
          <h2>Latest News</h2>
          <div id="newsContainer" class="card muted">No news available.</div>
        </section>
      </main>
    </div>
  </div>

  <script>
    // Robust JS to power the dashboard (runs after page load)
    (function(){
      const $ = id => document.getElementById(id);
      const q = sel => document.querySelector(sel);
      const qa = sel => Array.from(document.querySelectorAll(sel));
      const safeParse = (s, fallback) => { try { return JSON.parse(s); } catch { return fallback; } };

      // Elements
      const dashboard = $('dashboard');
      const logoutBtn = $('logoutBtn');
      const importDemo = $('importDemo');
      const clearDataBtn = $('clearDataBtn');
      const navButtons = qa('.nav-btn');
      const tabs = qa('.tab');
      const licenseForm = $('licenseForm');
      const licenseKey = $('licenseKey');
      const licenseStatus = $('licenseStatus');
      const myLicenses = $('myLicenses');
      const productsContainer = $('productsContainer');

      // State
      let profile = safeParse(localStorage.getItem('profile'), null);
      let licenses = safeParse(localStorage.getItem('licenses'), []);

      // UI helpers
      function openTab(id){
        tabs.forEach(t => t.style.display = 'none');
        const el = document.getElementById(id);
        if(el) el.style.display = 'block';
      }

      function renderMyLicenses(){
        myLicenses.innerHTML = '';
        if(!licenses || licenses.length === 0){ myLicenses.textContent = 'No licenses yet.'; return; }
        licenses.forEach(l => {
          const d = document.createElement('div');
          d.className = 'card';
          d.style.marginBottom = '8px';
          d.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center"><div><strong>'+escapeHtml(l.product)+'</strong></div><div>'+(l.tier==='PRO'?'<span style="background:#ffd700;color:#000;padding:6px 10px;border-radius:6px;font-weight:900">PRO</span>':'<span style="color:#0f0">FREE</span>')+'</div></div><div style="margin-top:8px"><strong>Key</strong>: '+escapeHtml(l.key)+'</div><div><strong>Status</strong>: '+escapeHtml(l.status)+'</div>';
          myLicenses.appendChild(d);
        });
      }

      function renderProducts(){
        productsContainer.innerHTML = '';
        if(!licenses || licenses.length === 0){ productsContainer.innerHTML = '<div class="card">No active products. Redeem a license in Use Key.</div>'; return; }
        const byProduct = {};
        licenses.forEach(l => { const p = l.product || 'Unknown'; (byProduct[p] = byProduct[p] || []).push(l); });
        Object.keys(byProduct).forEach(prod => {
          const items = byProduct[prod];
          const card = document.createElement('div'); card.className='card';
          card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">'+escapeHtml(prod)+'</h3><div>'+(items.some(i=>i.tier==='PRO')?'<span style="background:#ffd700;color:#000;padding:6px 10px;border-radius:6px;font-weight:900">PRO</span>':'<span style="color:#0f0">FREE</span>')+'</div></div><p><strong>Licenses:</strong> '+items.length+'</p>';
          productsContainer.appendChild(card);
        });
      }

      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

      // Attach nav handlers
      navButtons.forEach(btn => btn.addEventListener('click', () => openTab(btn.dataset.tab)));

      // License form
      if(licenseForm){
        licenseForm.addEventListener('submit', function(e){
          e.preventDefault();
          const key = (licenseKey.value || '').trim();
          if(!key){ licenseStatus.textContent = 'Enter a key'; return; }
          const obj = {
            key,
            product: key.split('-').pop() || 'Unknown',
            status: 'ACTIVE',
            created: new Date().toISOString().split('T')[0],
            author: profile ? profile.username : 'guest',
            tier: /PRO/i.test(key) ? 'PRO' : 'FREE',
            features: /PRO/i.test(key) ? ['Pro features'] : ['Basic features']
          };
          licenses.unshift(obj);
          try { localStorage.setItem('licenses', JSON.stringify(licenses)); } catch(e){}
          licenseStatus.textContent = 'Stored locally ('+obj.tier+')';
          renderMyLicenses();
          renderProducts();
          licenseForm.reset();
        });
      }

      // Demo import
      if(importDemo){
        importDemo.addEventListener('click', function(){
          licenses = [
            { key:'PRO-NEON-001', product:'NeonSuite', status:'ACTIVE', created:'2026-03-01', author:'demo', tier:'PRO', features:['Aimbot','Wallhack'] },
            { key:'FREE-NEON-000', product:'NeonSuite', status:'ACTIVE', created:'2026-02-20', author:'demo', tier:'FREE', features:['Basic features'] }
          ];
          try { localStorage.setItem('licenses', JSON.stringify(licenses)); } catch(e){}
          renderMyLicenses();
          renderProducts();
          alert('Demo licenses imported');
        });
      }

      // Logout & clear
      if(logoutBtn){
        logoutBtn.addEventListener('click', function(){
          profile = null;
          try { localStorage.removeItem('profile'); } catch(e){}
          document.getElementById('loginScreen').style.display='flex';
          dashboard.style.display='none';
          dashboard.setAttribute('aria-hidden','true');
        });
      }
      if(clearDataBtn){
        clearDataBtn.addEventListener('click', function(){
          if(!confirm('Clear local data (profile + licenses)?')) return;
          try { localStorage.removeItem('profile'); localStorage.removeItem('licenses'); } catch(e){}
          profile = null; licenses = [];
          myLicenses.innerHTML = 'No licenses yet.'; productsContainer.innerHTML = 'No products yet.';
          document.getElementById('loginScreen').style.display='flex';
          dashboard.style.display='none';
          dashboard.setAttribute('aria-hidden','true');
        });
      }

      // Auto-show if profile exists
      if(profile && profile.username){
        $('usernameDisplay').textContent = profile.username;
        $('emailDisplay').textContent = profile.email || '';
        dashboard.style.display='flex';
        dashboard.setAttribute('aria-hidden','false');
        renderMyLicenses();
        renderProducts();
        openTab('user');
      } else {
        // ensure login screen visible
        document.getElementById('loginScreen').style.display='flex';
        dashboard.style.display='none';
        dashboard.setAttribute('aria-hidden','true');
      }

      // expose for debugging
      window.__unknows = { profile, licenses, renderMyLicenses, renderProducts };
    })();
  </script>
</body>
</html>
