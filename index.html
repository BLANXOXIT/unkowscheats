<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Complete Dashboard — Single File</title>
  <style>
    :root{
      --bg:#070708; --panel:#0f1113; --card:#141518; --muted:#9aa0a6;
      --accent:#ff7a7a; --accent-2:#ffb86b; --text:#e6eef6;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:linear-gradient(180deg,var(--bg),#0b0b0d);color:var(--text);-webkit-font-smoothing:antialiased}
    /* Centered login */
    #loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
    .login-box{width:360px;background:var(--panel);padding:28px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.6);text-align:center}
    .login-box h2{margin:0 0 14px;font-size:20px}
    .login-box input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #222;background:#0b0b0d;color:var(--text);font-size:14px}
    .primary{background:linear-gradient(90deg,var(--accent-2),var(--accent));border:0;color:#0b0b0d;padding:10px 12px;border-radius:8px;cursor:pointer;font-weight:700}
    .danger{background:#ff6b6b;border:0;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}
    .muted{color:var(--muted);font-size:13px;margin-top:8px}
    .hidden{display:none}
    /* Dashboard */
    #dashboard{display:flex;min-height:100vh}
    .sidebar{width:220px;padding:20px;background:var(--panel);box-shadow:2px 0 30px rgba(0,0,0,.6)}
    .sidebar h2{margin:0 0 18px;font-size:18px}
    .sidebar nav button{display:block;width:100%;margin:8px 0;padding:10px;border-radius:8px;border:0;background:#111;color:var(--text);text-align:left;cursor:pointer}
    .main{flex:1;padding:28px;overflow:auto}
    .card{background:var(--card);padding:14px;border-radius:10px;margin-bottom:12px;box-shadow:0 6px 20px rgba(0,0,0,.4)}
    .small{font-size:13px;color:var(--muted)}
    .badge-pro{background:#ffd700;color:#000;padding:6px 10px;border-radius:6px;font-weight:700}
    @media (max-width:900px){.sidebar{display:none}.main{padding:16px}}
    /* simple responsive form buttons */
    .row{display:flex;gap:8px}
    .row .flex{flex:1}
    /* accessibility focus */
    button:focus,input:focus{outline:2px solid rgba(255,122,122,.25);outline-offset:2px}
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="loginScreen" role="dialog" aria-labelledby="loginTitle">
    <div class="login-box" role="form" aria-labelledby="loginTitle">
      <h2 id="loginTitle">Login</h2>
      <input id="loginUsername" type="text" placeholder="Username" autocomplete="username" />
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" />
      <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="loginBtn" class="primary">Let's go!</button>
      <div id="loginError" class="muted" aria-live="polite"></div>
    </div>
  </div>

  <!-- DASHBOARD hidden until login -->
  <div id="dashboard" class="hidden" role="application" aria-hidden="true">
    <aside class="sidebar" role="navigation" aria-label="Main">
      <h2>Yeageth</h2>
      <nav>
        <button data-tab="user">User</button>
        <button data-tab="products">Products</button>
        <button data-tab="license">Use Key</button>
        <button data-tab="news">News</button>
        <button data-tab="social">Social</button>
        <button data-tab="referral">Referral</button>
      </nav>
    </aside>

    <main class="main" role="main">
      <section id="user" class="tab">
        <h2>User Profile</h2>
        <div class="card">
          <p><strong>Welcome</strong> <span id="usernameDisplay">—</span></p>
          <p><strong>Email</strong> <span id="emailDisplay">—</span></p>
          <p><strong>Status</strong> <span id="statusDisplay">Active</span></p>
          <div style="margin-top:12px" class="row">
            <button id="logoutBtn" class="danger">Logout</button>
            <button id="clearDataBtn" class="primary">Clear Local Data</button>
          </div>
        </div>
      </section>

      <section id="products" class="tab hidden">
        <h2>Your Products</h2>
        <div id="productsContainer" class="card">No products yet.</div>
      </section>

      <section id="license" class="tab hidden">
        <h2>Redeem License</h2>
        <form id="licenseForm" class="card" autocomplete="off">
          <input id="licenseKey" type="text" placeholder="XXXXX-XXXXX-XXXXX" />
          <div style="margin-top:8px" class="row">
            <button type="submit" class="primary flex">Activate Key</button>
            <button type="button" id="importDemo" class="primary">Demo</button>
          </div>
          <div id="licenseStatus" class="small"></div>
        </form>
        <div class="card"><h3>My Licenses</h3><div id="myLicenses">No licenses yet.</div></div>
      </section>

      <section id="news" class="tab hidden"><h2>Latest News</h2><div id="newsContainer" class="card small">No news.</div></section>
      <section id="social" class="tab hidden"><h2>Social</h2><div class="card small">Discord / Twitter links here.</div></section>
      <section id="referral" class="tab hidden"><h2>Referral</h2><div class="card small">Your referral code: <strong id="referralCode">—</strong></div></section>
    </main>
  </div>

  <script>
    (function(){
      // Utility
      const $ = id => document.getElementById(id);
      const qs = sel => document.querySelector(sel);
      const qsa = sel => Array.from(document.querySelectorAll(sel));
      const safeParse = (s, fallback) => { try { return JSON.parse(s); } catch { return fallback; } };

      // Elements
      const loginScreen = $('loginScreen');
      const dashboard = $('dashboard');
      const loginBtn = $('loginBtn');
      const loginError = $('loginError');
      const usernameInput = $('loginUsername');
      const emailInput = $('loginEmail');
      const passwordInput = $('loginPassword');
      const usernameDisplay = $('usernameDisplay');
      const emailDisplay = $('emailDisplay');
      const logoutBtn = $('logoutBtn');
      const clearDataBtn = $('clearDataBtn');
      const sidebarButtons = qsa('.sidebar nav button');
      const tabs = qsa('.tab');
      const licenseForm = $('licenseForm');
      const licenseStatus = $('licenseStatus');
      const myLicenses = $('myLicenses');
      const productsContainer = $('productsContainer');
      const referralCodeEl = $('referralCode');
      const importDemo = $('importDemo');

      // State
      let profile = safeParse(localStorage.getItem('profile'), null);
      let licenses = safeParse(localStorage.getItem('licenses'), []);

      // Helpers
      function saveProfile(p){ try { localStorage.setItem('profile', JSON.stringify(p)); } catch{} }
      function saveLicenses(){ try { localStorage.setItem('licenses', JSON.stringify(licenses)); } catch{} }
      function show(el){ el && el.classList.remove('hidden'); }
      function hide(el){ el && el.classList.add('hidden'); }
      function openTab(id){
        tabs.forEach(t => t.classList.add('hidden'));
        const el = $(id);
        if(el) el.classList.remove('hidden');
      }

      // Login flow
      function handleLogin(){
        loginError.textContent = '';
        const u = (usernameInput.value || '').trim();
        const e = (emailInput.value || '').trim();
        const p = (passwordInput.value || '').trim();
        if(!u || !e || !p){ loginError.textContent = 'Fill all fields'; return; }
        profile = { username: u, email: e, status: 'Active', referral: 'REF-' + Math.random().toString(36).slice(2,9).toUpperCase() };
        saveProfile(profile);
        showDashboard();
      }

      function showDashboard(){
        hide(loginScreen);
        show(dashboard);
        dashboard.setAttribute('aria-hidden','false');
        usernameDisplay.textContent = profile.username || '—';
        emailDisplay.textContent = profile.email || '—';
        referralCodeEl.textContent = profile.referral || '—';
        renderMyLicenses();
        renderProducts();
        openTab('user');
      }

      function showLogin(){
        show(loginScreen);
        hide(dashboard);
        dashboard.setAttribute('aria-hidden','true');
      }

      // Logout / clear
      function handleLogout(){
        profile = null;
        localStorage.removeItem('profile');
        showLogin();
      }
      function handleClearData(){
        if(!confirm('Clear all local data (licenses + profile)?')) return;
        localStorage.removeItem('profile');
        localStorage.removeItem('licenses');
        profile = null;
        licenses = [];
        myLicenses.innerHTML = 'No licenses yet.';
        productsContainer.innerHTML = 'No products yet.';
        showLogin();
      }

      // License handling
      function handleLicenseSubmit(e){
        e.preventDefault();
        const key = ($('licenseKey').value || '').trim();
        if(!key){ licenseStatus.textContent = 'Enter a key'; return; }
        const obj = {
          key,
          product: key.split('-').pop() || 'Unknown',
          status: 'ACTIVE',
          created: new Date().toISOString().split('T')[0],
          author: profile ? profile.username : 'guest',
          tier: /PRO/i.test(key) ? 'PRO' : 'FREE',
          features: /PRO/i.test(key) ? ['Aimbot (fast)','Wallhack','Custom UI'] : ['Basic features']
        };
        licenses.unshift(obj);
        saveLicenses();
        licenseStatus.textContent = `Stored locally (${obj.tier})`;
        renderMyLicenses();
        renderProducts();
        licenseForm.reset();
      }

      // Renderers
      function renderMyLicenses(){
        myLicenses.innerHTML = '';
        if(!licenses || licenses.length === 0){ myLicenses.textContent = 'No licenses yet.'; return; }
        licenses.forEach(l => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.marginBottom = '8px';
          card.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div><strong>${escapeHtml(l.product)}</strong></div>
              <div>${l.tier === 'PRO' ? '<span class="badge-pro">PRO</span>' : '<span style="color:#0f0">FREE</span>'}</div>
            </div>
            <div style="margin-top:8px"><strong>Key</strong>: ${escapeHtml(l.key)}</div>
            <div><strong>Status</strong>: ${escapeHtml(l.status)}</div>
            <div style="margin-top:8px"><strong>Features</strong><ul>${(l.features||[]).map(f=>`<li>${escapeHtml(f)}</li>`).join('')}</ul></div>
            <div style="margin-top:8px"><button class="revoke">Revoke</button></div>
          `;
          card.querySelector('.revoke').addEventListener('click', () => {
            if(!confirm('Revoke this license locally?')) return;
            licenses = licenses.filter(x => x.key !== l.key);
            saveLicenses();
            renderMyLicenses();
            renderProducts();
          });
          myLicenses.appendChild(card);
        });
      }

      function renderProducts(){
        productsContainer.innerHTML = '';
        if(!licenses || licenses.length === 0){ productsContainer.innerHTML = '<div class="card">No active products. Redeem a license in Use Key.</div>'; return; }
        const byProduct = {};
        licenses.forEach(l => { const p = l.product || 'Unknown'; (byProduct[p] = byProduct[p] || []).push(l); });
        Object.keys(byProduct).forEach(prod => {
          const items = byProduct[prod];
          const isPro = items.some(i => i.tier === 'PRO');
          const card = document.createElement('div'); card.className = 'card';
          if(isPro) card.style.border = '2px solid #ffd700';
          card.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">${escapeHtml(prod)}</h3>${isPro?'<span class="badge-pro">PRO</span>':'<span style="color:#0f0">FREE</span>'}</div><p><strong>Licenses:</strong> ${items.length}</p>`;
          const list = document.createElement('div'); list.style.marginTop = '8px';
          items.forEach(i => {
            const r = document.createElement('div'); r.style.margin = '8px 0';
            r.innerHTML = `<div><strong>Key:</strong> ${escapeHtml(i.key)}</div><div><strong>Status:</strong> ${escapeHtml(i.status)}</div><div><strong>Activated:</strong> ${escapeHtml(i.created)}</div>`;
            if(i.tier === 'PRO'){ const feat = document.createElement('div'); feat.style.marginTop='6px'; feat.innerHTML = `<strong style="color:#ffd700">PRO Features</strong><ul>${(i.features||[]).map(f=>`<li>${escapeHtml(f)}</li>`).join('')}</ul>`; r.appendChild(feat); }
            list.appendChild(r);
          });
          card.appendChild(list);
          productsContainer.appendChild(card);
        });
      }

      // Demo import
      function importDemoData(){
        licenses = [
          { key:'PRO-12345-CS2', product:'CS2', status:'ACTIVE', created:'2026-03-01', author:'demo', tier:'PRO', features:['Aimbot','Wallhack','Custom UI'] },
          { key:'FREE-00000-TEST', product:'CS2', status:'ACTIVE', created:'2026-02-20', author:'demo', tier:'FREE', features:['Basic features'] }
        ];
        saveLicenses();
        renderMyLicenses();
        renderProducts();
        alert('Demo licenses imported');
      }

      // small helper to avoid XSS when injecting text
      function escapeHtml(str){ return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }

      // Attach events (safe after DOM ready)
      loginBtn.addEventListener('click', handleLogin);
      logoutBtn.addEventListener('click', handleLogout);
      clearDataBtn.addEventListener('click', handleClearData);
      sidebarButtons.forEach(btn => btn.addEventListener('click', () => openTab(btn.dataset.tab)));
      if(licenseForm) licenseForm.addEventListener('submit', handleLicenseSubmit);
      if(importDemo) importDemo.addEventListener('click', importDemoData);

      // Auto-show dashboard if profile exists
      if(profile && profile.username){
        showDashboard();
      } else {
        showLogin();
      }

      // Expose minimal debug on window for troubleshooting if needed
      window.__app = { profile, licenses, renderMyLicenses, renderProducts, showDashboard, showLogin };
    })();
  </script>
</body>
</html>
