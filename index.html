<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neon Dashboard — Login</title>

  <!-- Google font (optional) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#05060a;
      --bg-2:#0b0b12;
      --panel:rgba(255,255,255,0.03);
      --glass:rgba(255,255,255,0.03);
      --muted:#9aa0a6;
      --neon-pink:#ff4da6;
      --neon-cyan:#00e5ff;
      --neon-amber:#ffb86b;
      --text:#e6eef6;
      --glass-border:rgba(255,255,255,0.06);
      --shadow: 0 10px 40px rgba(2,6,23,0.7);
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(120deg,var(--bg-1),var(--bg-2));color:var(--text);-webkit-font-smoothing:antialiased}
    body{overflow:hidden}

    /* animated gradient background + subtle noise */
    .bg {
      position:fixed;inset:0;z-index:-2;
      background: radial-gradient(600px 400px at 10% 20%, rgba(0,229,255,0.06), transparent 10%),
                  radial-gradient(500px 300px at 90% 80%, rgba(255,77,166,0.06), transparent 12%),
                  linear-gradient(120deg,#02030a 0%, #071026 50%, #0b0b12 100%);
      animation: bgShift 12s linear infinite alternate;
      filter: blur(10px) saturate(1.05);
    }
    @keyframes bgShift { from { transform: scale(1) translateY(0) } to { transform: scale(1.03) translateY(-10px) } }

    /* subtle grid lines (neon) */
    .grid {
      position:fixed;inset:0;z-index:-1;opacity:0.06;
      background-image:
        linear-gradient(transparent 95%, rgba(255,255,255,0.02) 95%),
        linear-gradient(90deg, transparent 95%, rgba(255,255,255,0.02) 95%);
      background-size: 120px 120px, 120px 120px;
      mix-blend-mode: overlay;
    }

    /* Layout */
    .app {
      display:flex;
      height:100vh;
      width:100vw;
      align-items:center;
      justify-content:center;
      padding:28px;
    }

    /* Centered login container */
    .login-screen {
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      height:100%;
    }

    .login-card {
      width:380px;
      padding:28px;
      border-radius:14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px) saturate(1.1);
      position:relative;
      overflow:hidden;
    }

    /* neon rim */
    .login-card::before{
      content:"";
      position:absolute;inset:-2px;
      background:linear-gradient(90deg,var(--neon-cyan),var(--neon-pink),var(--neon-amber));
      filter:blur(18px);
      opacity:0.6;
      z-index:-1;
      transform:scale(1.06);
    }

    .brand {
      display:flex;align-items:center;gap:12px;margin-bottom:12px;
    }
    .logo {
      width:44px;height:44px;border-radius:10px;
      background:linear-gradient(135deg,var(--neon-pink),var(--neon-cyan));
      box-shadow:0 6px 18px rgba(0,0,0,0.6), 0 0 18px rgba(0,229,255,0.12);
      display:flex;align-items:center;justify-content:center;font-weight:800;color:#071026;
      font-size:18px;
    }
    h1{margin:0;font-size:18px;font-weight:700;letter-spacing:0.4px}
    p.lead{margin:6px 0 18px;color:var(--muted);font-size:13px}

    /* Inputs */
    .field {margin-bottom:12px}
    input[type="text"], input[type="email"], input[type="password"]{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.04);
      background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      color:var(--text);
      font-size:14px;
      transition: box-shadow .18s, border-color .18s, transform .12s;
      outline:none;
    }
    input::placeholder{color:rgba(230,238,246,0.35)}
    input:focus{
      box-shadow: 0 0 18px rgba(0,229,255,0.08), 0 0 28px rgba(255,77,166,0.04);
      border-color: rgba(0,229,255,0.25);
      transform: translateY(-1px);
    }

    /* Neon button */
    .btn {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:0;
      font-weight:700;
      cursor:pointer;
      color:#071026;
      background:linear-gradient(90deg,var(--neon-amber),var(--neon-pink));
      box-shadow: 0 8px 30px rgba(255,122,122,0.08), 0 0 28px rgba(255,77,166,0.12);
      transition: transform .12s, box-shadow .12s, filter .12s;
    }
    .btn:hover{ transform: translateY(-3px); filter:brightness(1.03) }
    .btn:active{ transform: translateY(-1px) }

    /* small muted text */
    .muted { color:var(--muted); font-size:13px; margin-top:8px; text-align:center }

    /* Dashboard layout */
    .dashboard {
      display:flex;
      width:100%;
      height:100%;
      min-height:640px;
      border-radius:14px;
      overflow:hidden;
      box-shadow: var(--shadow);
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      border:1px solid var(--glass-border);
    }

    .sidebar {
      width:260px;
      padding:22px;
      background: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(255,255,255,0.02));
      border-right:1px solid rgba(255,255,255,0.02);
      display:flex;flex-direction:column;gap:12px;
    }
    .sidebar h2{margin:0;color:var(--neon-cyan);font-size:20px}
    .nav-btn {
      display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:0;background:transparent;color:var(--text);cursor:pointer;
      transition: background .12s, box-shadow .12s, transform .08s;
    }
    .nav-btn:hover{ background: linear-gradient(90deg, rgba(0,229,255,0.03), rgba(255,77,166,0.02)); transform: translateX(6px) }
    .nav-btn.active{ box-shadow: 0 6px 20px rgba(0,229,255,0.06); border-left:4px solid var(--neon-cyan;); }

    .main {
      flex:1;padding:28px;overflow:auto;
      background: linear-gradient(180deg, rgba(255,255,255,0.005), rgba(255,255,255,0.002));
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid rgba(255,255,255,0.02);
      box-shadow: 0 6px 20px rgba(2,6,23,0.6);
    }

    .badge { display:inline-block;padding:6px 10px;border-radius:8px;background:linear-gradient(90deg,var(--neon-amber),var(--neon-pink));color:#071026;font-weight:700 }

    /* small responsive */
    @media (max-width:980px){
      .dashboard{flex-direction:column}
      .sidebar{width:100%;display:flex;flex-direction:row;overflow:auto}
      .sidebar nav{display:flex;gap:8px}
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="app" id="appRoot">
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen" role="dialog" aria-labelledby="loginTitle">
      <div class="login-card" role="form" aria-labelledby="loginTitle">
        <div class="brand">
          <div class="logo">NG</div>
          <div>
            <h1>NeonGate</h1>
            <p class="lead">Pro dashboard UI — neon edition</p>
          </div>
        </div>

        <div class="field">
          <input id="loginUsername" type="text" placeholder="Username" autocomplete="username" />
        </div>
        <div class="field">
          <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" />
        </div>
        <div class="field">
          <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
        </div>

        <button id="loginBtn" class="btn" aria-label="Login">Let's go!</button>
        <div id="loginError" class="muted" aria-live="polite"></div>
      </div>
    </div>

    <!-- DASHBOARD (hidden until login) -->
    <div id="dashboard" class="dashboard hidden" role="application" aria-hidden="true" style="display:none">
      <aside class="sidebar" role="navigation" aria-label="Main">
        <h2>NeonGate</h2>
        <nav>
          <button class="nav-btn" data-tab="user">User</button>
          <button class="nav-btn" data-tab="products">Products</button>
          <button class="nav-btn" data-tab="license">Use Key</button>
          <button class="nav-btn" data-tab="news">News</button>
        </nav>
        <div style="flex:1"></div>
        <div style="font-size:12px;color:var(--muted)">Built with glow • Local demo</div>
      </aside>

      <main class="main" role="main">
        <section id="user" class="tab">
          <h2>User Profile <span class="badge" id="statusBadge">Active</span></h2>
          <div class="card">
            <p><strong>Welcome</strong> <span id="usernameDisplay">—</span></p>
            <p><strong>Email</strong> <span id="emailDisplay">—</span></p>
            <div style="margin-top:12px;display:flex;gap:8px">
              <button id="logoutBtn" class="btn" style="background:linear-gradient(90deg,var(--neon-pink),var(--neon-cyan));color:#071026">Logout</button>
              <button id="importDemo" class="btn" style="background:linear-gradient(90deg,var(--neon-amber),var(--neon-pink));color:#071026">Import Demo Licenses</button>
            </div>
          </div>
        </section>

        <section id="products" class="tab" style="display:none">
          <h2>Your Products</h2>
          <div id="productsContainer" class="card">No products yet.</div>
        </section>

        <section id="license" class="tab" style="display:none">
          <h2>Redeem License</h2>
          <form id="licenseForm" class="card" autocomplete="off">
            <input id="licenseKey" type="text" placeholder="XXXXX-XXXXX-XXXXX" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:var(--text)" />
            <div style="margin-top:12px;display:flex;gap:8px">
              <button type="submit" class="btn" style="flex:1">Activate Key</button>
              <button type="button" id="clearDataBtn" class="btn" style="background:linear-gradient(90deg,#ff6b6b,#ff4d4d);color:#fff">Clear Data</button>
            </div>
            <div id="licenseStatus" class="muted" style="margin-top:10px"></div>
          </form>
          <div class="card"><h3>My Licenses</h3><div id="myLicenses">No licenses yet.</div></div>
        </section>

        <section id="news" class="tab" style="display:none">
          <h2>Latest News</h2>
          <div id="newsContainer" class="card muted">No news available.</div>
        </section>
      </main>
    </div>
  </div>

  <script>
    // Neon dashboard JS (single-file, robust)
    (function(){
      // helpers
      const $ = id => document.getElementById(id);
      const q = sel => document.querySelector(sel);
      const qa = sel => Array.from(document.querySelectorAll(sel));
      const safeParse = (s, fallback) => { try { return JSON.parse(s); } catch { return fallback; } };

      // elements
      const loginScreen = $('loginScreen');
      const loginBtn = $('loginBtn');
      const loginError = $('loginError');
      const usernameInput = $('loginUsername');
      const emailInput = $('loginEmail');
      const passwordInput = $('loginPassword');

      const dashboard = $('dashboard');
      const usernameDisplay = $('usernameDisplay');
      const emailDisplay = $('emailDisplay');
      const logoutBtn = $('logoutBtn');
      const importDemo = $('importDemo');
      const clearDataBtn = $('clearDataBtn');

      const navButtons = qa('.nav-btn');
      const tabs = qa('.tab');

      const licenseForm = $('licenseForm');
      const licenseKey = $('licenseKey');
      const licenseStatus = $('licenseStatus');
      const myLicenses = $('myLicenses');
      const productsContainer = $('productsContainer');

      // state
      let profile = safeParse(localStorage.getItem('profile'), null);
      let licenses = safeParse(localStorage.getItem('licenses'), []);

      // UI helpers
      function showLogin(){ loginScreen.style.display='flex'; dashboard.style.display='none'; dashboard.setAttribute('aria-hidden','true'); }
      function showDashboard(){ loginScreen.style.display='none'; dashboard.style.display='flex'; dashboard.setAttribute('aria-hidden','false'); }
      function openTab(id){
        tabs.forEach(t => t.style.display = 'none');
        const el = document.getElementById(id);
        if(el) el.style.display = 'block';
      }

      // renderers
      function renderMyLicenses(){
        myLicenses.innerHTML = '';
        if(!licenses || licenses.length === 0){ myLicenses.textContent = 'No licenses yet.'; return; }
        licenses.forEach(l => {
          const d = document.createElement('div');
          d.className = 'card';
          d.style.marginBottom = '8px';
          d.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center"><div><strong>'+escapeHtml(l.product)+'</strong></div><div>'+(l.tier==='PRO'?'<span style="background:#ffd700;color:#000;padding:6px 10px;border-radius:6px;font-weight:700">PRO</span>':'<span style="color:#0f0">FREE</span>')+'</div></div><div style="margin-top:8px"><strong>Key</strong>: '+escapeHtml(l.key)+'</div><div><strong>Status</strong>: '+escapeHtml(l.status)+'</div>';
          myLicenses.appendChild(d);
        });
      }

      function renderProducts(){
        productsContainer.innerHTML = '';
        if(!licenses || licenses.length === 0){ productsContainer.innerHTML = '<div class="card">No active products. Redeem a license in Use Key.</div>'; return; }
        const byProduct = {};
        licenses.forEach(l => { const p = l.product || 'Unknown'; (byProduct[p] = byProduct[p] || []).push(l); });
        Object.keys(byProduct).forEach(prod => {
          const items = byProduct[prod];
          const card = document.createElement('div'); card.className='card';
          card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">'+escapeHtml(prod)+'</h3><div>'+(items.some(i=>i.tier==='PRO')?'<span style="background:#ffd700;color:#000;padding:6px 10px;border-radius:6px;font-weight:700">PRO</span>':'<span style="color:#0f0">FREE</span>')+'</div></div><p><strong>Licenses:</strong> '+items.length+'</p>';
          productsContainer.appendChild(card);
        });
      }

      // small XSS-safe helper
      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

      // login handler
      loginBtn.addEventListener('click', function(){
        loginError.textContent = '';
        const u = (usernameInput.value || '').trim();
        const e = (emailInput.value || '').trim();
        const p = (passwordInput.value || '').trim();
        if(!u || !e || !p){ loginError.textContent = 'Fill all fields'; return; }
        profile = { username: u, email: e, status: 'Active', referral: 'REF-'+Math.random().toString(36).slice(2,9).toUpperCase() };
        try { localStorage.setItem('profile', JSON.stringify(profile)); } catch(e){}
        usernameDisplay.textContent = profile.username;
        emailDisplay.textContent = profile.email;
        showDashboard();
        renderMyLicenses();
        renderProducts();
        openTab('user');
      });

      // logout
      logoutBtn.addEventListener('click', function(){
        profile = null;
        try { localStorage.removeItem('profile'); } catch(e){}
        showLogin();
      });

      // clear data
      clearDataBtn.addEventListener('click', function(){
        if(!confirm('Clear local data (profile + licenses)?')) return;
        try { localStorage.removeItem('profile'); localStorage.removeItem('licenses'); } catch(e){}
        profile = null; licenses = [];
        myLicenses.innerHTML = 'No licenses yet.'; productsContainer.innerHTML = 'No products yet.';
        showLogin();
      });

      // nav buttons
      navButtons.forEach(btn => btn.addEventListener('click', function(){
        openTab(btn.dataset.tab);
      }));

      // license form
      if(licenseForm){
        licenseForm.addEventListener('submit', function(ev){
          ev.preventDefault();
          const key = (licenseKey.value || '').trim();
          if(!key){ licenseStatus.textContent = 'Enter a key'; return; }
          const obj = {
            key,
            product: key.split('-').pop() || 'Unknown',
            status: 'ACTIVE',
            created: new Date().toISOString().split('T')[0],
            author: profile ? profile.username : 'guest',
            tier: /PRO/i.test(key) ? 'PRO' : 'FREE',
            features: /PRO/i.test(key) ? ['Pro features'] : ['Basic features']
          };
          licenses.unshift(obj);
          try { localStorage.setItem('licenses', JSON.stringify(licenses)); } catch(e){}
          licenseStatus.textContent = 'Stored locally ('+obj.tier+')';
          renderMyLicenses();
          renderProducts();
          licenseForm.reset();
        });
      }

      // demo import
      importDemo.addEventListener('click', function(){
        licenses = [
          { key:'PRO-NEON-001', product:'NeonSuite', status:'ACTIVE', created:'2026-03-01', author:'demo', tier:'PRO', features:['Aimbot','Wallhack'] },
          { key:'FREE-NEON-000', product:'NeonSuite', status:'ACTIVE', created:'2026-02-20', author:'demo', tier:'FREE', features:['Basic features'] }
        ];
        try { localStorage.setItem('licenses', JSON.stringify(licenses)); } catch(e){}
        renderMyLicenses();
        renderProducts();
        alert('Demo licenses imported');
      });

      // initial UI state
      if(profile && profile.username){
        usernameDisplay.textContent = profile.username;
        emailDisplay.textContent = profile.email || '';
        showDashboard();
        renderMyLicenses();
        renderProducts();
        openTab('user');
      } else {
        showLogin();
      }

      // expose for debugging
      window.__neon = { profile, licenses, renderMyLicenses, renderProducts };
    })();
  </script>
</body>
</html>
