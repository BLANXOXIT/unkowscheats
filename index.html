<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="sidebar">
    <h2>Unknows</h2>
    <button onclick="showTab('user')">User</button>
    <button onclick="showTab('products')">Products</button>
    <button onclick="showTab('license')">Use Key</button>
    <button onclick="showTab('news')">News</button>
    <button onclick="showTab('social')">Social</button>
    <button onclick="showTab('referral')">Referral</button>
  </div>

  <div class="main">
    <!-- USER TAB -->
    <div id="user" class="tab">
      <h2>User Profile</h2>

      <div class="card">
        <label><strong>Username</strong></label>
        <input id="inputUsername" placeholder="Enter username" />
        <label><strong>Email</strong></label>
        <input id="inputEmail" placeholder="Enter email" />
        <div style="text-align:center; margin-top:10px;">
          <button id="saveProfileBtn">Save Profile</button>
        </div>
      </div>

      <div class="card" id="profileDisplay" style="margin-top:20px;">
        <h3>Profile</h3>
        <p><strong>Welcome</strong> <span id="usernameDisplay">—</span></p>
        <p><strong>Email</strong> <span id="emailDisplay">—</span></p>
        <p><strong>HWID</strong> <span id="hwidDisplay">Not Set</span></p>
        <p><strong>Status</strong> <span id="statusDisplay">Inactive</span></p>
        <div>
          <button id="resetHwidBtn">Reset HWID</button>
          <button id="changePassBtn">Change Password</button>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>

    <!-- PRODUCTS TAB -->
    <div id="products" class="tab" style="display:none;">
      <h2>Your Products</h2>
      <div id="productsContainer"></div>
    </div>

    <!-- LICENSE TAB -->
    <div id="license" class="tab" style="display:none;">
      <h2>Redeem License</h2>

      <div class="card">
        <form id="licenseForm">
          <label><strong>License Key</strong></label>
          <input type="text" id="licenseKey" placeholder="XXXXX-XXXXX-XXXXX" required />
          <label><strong>Product (optional)</strong></label>
          <input type="text" id="licenseProduct" placeholder="Product name (e.g. CS2-ESP)" />
          <div style="text-align:center; margin-top:10px;">
            <button type="submit">Activate Key</button>
          </div>
        </form>
        <div id="licenseStatus" style="margin-top:12px;"></div>
      </div>

      <div class="card" style="margin-top:16px;">
        <h3>My Licenses</h3>
        <div id="myLicenses"></div>
      </div>
    </div>

    <!-- NEWS TAB -->
    <div id="news" class="tab" style="display:none;">
      <h2>Latest News</h2>
      <div id="newsContainer"></div>
    </div>

    <!-- SOCIAL TAB -->
    <div id="social" class="tab" style="display:none;">
      <h2>Social</h2>
      <p>Discord: <a id="discordLink" href="#" target="_blank">Join</a></p>
      <p>Twitter: <a id="twitterLink" href="#" target="_blank">@handle</a></p>
    </div>

    <!-- REFERRAL TAB -->
    <div id="referral" class="tab" style="display:none;">
      <h2>Referral</h2>
      <p>Your referral code: <span id="referralCode">—</span></p>
      <button id="copyReferral">Copy</button>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
