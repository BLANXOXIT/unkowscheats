<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen">
    <div class="login-box" role="form" aria-labelledby="loginTitle">
      <h2 id="loginTitle">Login</h2>
      <input type="text" id="loginUsername" placeholder="Username" autocomplete="username" />
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="email" />
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" />
      <button id="loginBtn" class="primary">Let's go!</button>
      <div id="loginError" class="muted" aria-live="polite"></div>
    </div>
  </div>

  <!-- DASHBOARD (hidden until login) -->
  <div id="dashboard" class="hidden">
    <aside class="sidebar" role="navigation" aria-label="Main">
      <h2>Yeageth</h2>
      <nav>
        <button data-tab="user">User</button>
        <button data-tab="products">Products</button>
        <button data-tab="license">Use Key</button>
        <button data-tab="news">News</button>
        <button data-tab="social">Social</button>
        <button data-tab="referral">Referral</button>
      </nav>
    </aside>

    <main class="main" role="main">
      <section id="user" class="tab">
        <h2>User Profile</h2>
        <div class="card">
          <p><strong>Welcome</strong> <span id="usernameDisplay">—</span></p>
          <p><strong>Email</strong> <span id="emailDisplay">—</span></p>
          <p><strong>Status</strong> <span id="statusDisplay">Active</span></p>
          <div class="actions">
            <button id="logoutBtn" class="danger">Logout</button>
          </div>
        </div>
      </section>

      <section id="products" class="tab hidden">
        <h2>Your Products</h2>
        <div id="productsContainer"></div>
      </section>

      <section id="license" class="tab hidden">
        <h2>Redeem License</h2>
        <form id="licenseForm" class="card">
          <input type="text" id="licenseKey" placeholder="XXXXX-XXXXX-XXXXX" required />
          <button type="submit" class="primary">Activate Key</button>
          <div id="licenseStatus" class="muted"></div>
        </form>
        <div class="card">
          <h3>My Licenses</h3>
          <div id="myLicenses"></div>
        </div>
      </section>

      <section id="news" class="tab hidden">
        <h2>Latest News</h2>
        <div id="newsContainer"></div>
      </section>

      <section id="social" class="tab hidden">
        <h2>Social</h2>
        <div class="card">
          <p>Discord: <a id="discordLink" href="#" target="_blank" rel="noopener">Join</a></p>
          <p>Twitter: <a id="twitterLink" href="#" target="_blank" rel="noopener">@handle</a></p>
        </div>
      </section>

      <section id="referral" class="tab hidden">
        <h2>Referral</h2>
        <div class="card">
          <p>Your referral code: <strong id="referralCode">—</strong></p>
          <button id="copyReferral">Copy</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
