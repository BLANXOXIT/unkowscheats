<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Dashboard Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { margin:0; font-family:Arial, sans-serif; background:#0b0b0d; color:#eee; }
    .login-container { display:flex; justify-content:center; align-items:center; height:100vh; }
    .login-box { background:#111; padding:30px; border-radius:10px; width:300px; box-shadow:0 0 20px rgba(0,0,0,.6); }
    .login-box h2 { margin-top:0; text-align:center; }
    .login-box input { width:100%; padding:10px; margin:8px 0; border-radius:6px; border:1px solid #333; background:#0b0b0d; color:#eee; }
    .login-box button { width:100%; padding:10px; margin-top:12px; border:0; border-radius:6px; background:#ff7a7a; color:#fff; cursor:pointer; }
    .hidden { display:none; }
    .sidebar { width:220px; padding:20px; background:#111; height:100vh; float:left; }
    .sidebar h2 { margin:0 0 18px; }
    .sidebar button { display:block; width:100%; margin:8px 0; padding:10px; border:0; border-radius:8px; background:#222; color:#ddd; cursor:pointer; text-align:left; }
    .main { margin-left:240px; padding:20px; }
    .card { background:#1a1a1a; padding:14px; border-radius:10px; margin-bottom:12px; }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-container">
    <div class="login-box">
      <h2>Login</h2>
      <input type="text" id="loginUsername" placeholder="Username" required />
      <input type="email" id="loginEmail" placeholder="Email" required />
      <input type="password" id="loginPassword" placeholder="Password" required />
      <button id="loginBtn">Let's go!</button>
    </div>
  </div>

  <!-- DASHBOARD (hidden until login) -->
  <div id="dashboard" class="hidden">
    <div class="sidebar">
      <h2>Yeageth</h2>
      <button onclick="showTab('user')">User</button>
      <button onclick="showTab('products')">Products</button>
      <button onclick="showTab('license')">Use Key</button>
      <button onclick="showTab('news')">News</button>
      <button onclick="showTab('social')">Social</button>
      <button onclick="showTab('referral')">Referral</button>
    </div>

    <div class="main">
      <!-- USER TAB -->
      <div id="user" class="tab">
        <h2>User Profile</h2>
        <div class="card">
          <p><strong>Welcome</strong> <span id="usernameDisplay">—</span></p>
          <p><strong>Email</strong> <span id="emailDisplay">—</span></p>
          <p><strong>Status</strong> Active</p>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- PRODUCTS TAB -->
      <div id="products" class="tab" style="display:none;">
        <h2>Your Products</h2>
        <div id="productsContainer"></div>
      </div>

      <!-- LICENSE TAB -->
      <div id="license" class="tab" style="display:none;">
        <h2>Redeem License</h2>
        <form id="licenseForm">
          <input type="text" id="licenseKey" placeholder="XXXXX-XXXXX-XXXXX" required />
          <button type="submit">Activate Key</button>
        </form>
        <div id="licenseStatus"></div>
      </div>

      <!-- NEWS TAB -->
      <div id="news" class="tab" style="display:none;">
        <h2>Latest News</h2>
        <div id="newsContainer"></div>
      </div>

      <!-- SOCIAL TAB -->
      <div id="social" class="tab" style="display:none;">
        <h2>Social</h2>
        <p>Links to Discord, Twitter, etc.</p>
      </div>

      <!-- REFERRAL TAB -->
      <div id="referral" class="tab" style="display:none;">
        <h2>Referral</h2>
        <p>Your referral code: <span id="referralCode">—</span></p>
      </div>
    </div>
  </div>

  <script>
    // Login logic
    document.getElementById('loginBtn').addEventListener('click', () => {
      const u = document.getElementById('loginUsername').value.trim();
      const e = document.getElementById('loginEmail').value.trim();
      const p = document.getElementById('loginPassword').value.trim();
      if(!u || !e || !p){ alert('Fill all fields'); return; }
      // Save user info locally
      localStorage.setItem('profile', JSON.stringify({username:u,email:e,status:'Active'}));
      // Hide login, show dashboard
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      // Show user info
      document.getElementById('usernameDisplay').textContent = u;
      document.getElementById('emailDisplay').textContent = e;
      showTab('user');
    });

    // Tab switching
    function showTab(tabId){
      document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
      document.getElementById(tabId).style.display='block';
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('profile');
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
    });
  </script>
</body>
</html>
