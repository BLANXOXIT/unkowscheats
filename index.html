<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HWID Demo Login</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#0f0f12;color:#e6eef8;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{background:#141418;padding:24px;border-radius:10px;width:360px}
    input,button{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid #222;background:#0b0b0d;color:#fff}
    button{background:#6b3cff;border:none;cursor:pointer}
    .muted{color:#9aa0a6;font-size:13px;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 8px 0">Sign in</h2>
    <div class="muted">Demo: any username/password accepted. Device id is generated and stored locally.</div>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
    <button id="resetBtn" style="margin-top:10px;background:#ff6b6b">Request HWID Reset (demo)</button>
    <div id="status" class="muted"></div>
  </div>

<script>
/*
Client logic:
- Generate a persistent deviceId stored in localStorage (acts as device HWID candidate).
- On login, POST { username, password, deviceId } to /login.
- Server will assign deviceId as account HWID if account has no HWID (or was reset).
- resetBtn calls /reset-hwid to clear server-side HWID (demo: no auth).
*/

const STORAGE_KEY = 'demo_device_id';

function getDeviceId(){
  let id = localStorage.getItem(STORAGE_KEY);
  if(!id){
    id = 'dev-' + Math.random().toString(36).slice(2,12);
    localStorage.setItem(STORAGE_KEY, id);
  }
  return id;
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const deviceId = getDeviceId();
  if(!username || !password){ setStatus('Fill username and password'); return; }
  setStatus('Logging in...');
  try{
    const res = await fetch('/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username, password, deviceId })
    });
    const data = await res.json();
    if(res.ok){
      setStatus('Login success. Server HWID: ' + (data.hwid || 'none'));
    } else {
      setStatus('Login failed: ' + (data.message || res.status));
    }
  }catch(err){
    setStatus('Server unreachable');
  }
});

document.getElementById('resetBtn').addEventListener('click', async () => {
  const username = document.getElementById('username').value.trim();
  if(!username){ setStatus('Enter username to reset'); return; }
  setStatus('Requesting HWID reset...');
  try{
    const res = await fetch('/reset-hwid', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username })
    });
    const data = await res.json();
    if(res.ok) setStatus('HWID reset on server. Next login will set new HWID.');
    else setStatus('Reset failed: ' + (data.message || res.status));
  }catch(err){
    setStatus('Server unreachable');
  }
});

function setStatus(t){ document.getElementById('status').textContent = t; }
</script>
</body>
</html>
