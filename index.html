<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login → Dashboard (guaranteed)</title>
  <style>
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:#070708;color:#e6eef6}
    /* Centered login */
    #loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
    .login-box{width:360px;background:#0f1113;padding:28px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.6);text-align:center}
    .login-box input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #222;background:#0b0b0d;color:#e6eef6}
    .btn{display:inline-block;padding:10px 14px;border-radius:8px;border:0;cursor:pointer;font-weight:700}
    .primary{background:linear-gradient(90deg,#ffb86b,#ff7a7a);color:#0b0b0d}
    .danger{background:#ff6b6b;color:#fff}
    .hidden{display:none}
    /* Dashboard */
    #dashboard{display:flex;min-height:100vh}
    .sidebar{width:220px;padding:20px;background:#111}
    .sidebar button{display:block;width:100%;margin:8px 0;padding:10px;border-radius:8px;border:0;background:#111;color:#ddd;text-align:left;cursor:pointer}
    .main{flex:1;padding:28px}
    .card{background:#141518;padding:14px;border-radius:10px;margin-bottom:12px}
    @media (max-width:900px){.sidebar{display:none}}
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="loginScreen" role="dialog" aria-labelledby="loginTitle">
    <div class="login-box" role="form" aria-labelledby="loginTitle">
      <h2 id="loginTitle">Login</h2>
      <input id="loginUsername" type="text" placeholder="Username" autocomplete="username" />
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" />
      <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
      <!-- Inline onclick ensures it works even if external JS fails -->
      <button id="loginBtn" class="btn primary"
        onclick="
          (function(){
            var u=document.getElementById('loginUsername').value.trim();
            var e=document.getElementById('loginEmail').value.trim();
            var p=document.getElementById('loginPassword').value.trim();
            if(!u||!e||!p){ alert('Fill all fields'); return; }
            // show dashboard
            document.getElementById('loginScreen').style.display='none';
            document.getElementById('dashboard').style.display='flex';
            document.getElementById('usernameDisplay').textContent = u;
            document.getElementById('emailDisplay').textContent = e;
            try{ localStorage.setItem('profile', JSON.stringify({username:u,email:e})); }catch(e){}
          })();
        ">Let's go!</button>
      <div id="loginError" style="color:#9aa0a6;margin-top:8px;font-size:13px"></div>
    </div>
  </div>

  <!-- DASHBOARD hidden until login -->
  <div id="dashboard" class="hidden" role="application" aria-hidden="true" style="display:none">
    <aside class="sidebar" role="navigation" aria-label="Main">
      <h2 style="margin:0 0 12px">Yeageth</h2>
      <nav>
        <button data-tab="user" onclick="(function(){document.querySelectorAll('.tab').forEach(t=>t.style.display='none');document.getElementById('user').style.display='block';})();">User</button>
        <button data-tab="products" onclick="(function(){document.querySelectorAll('.tab').forEach(t=>t.style.display='none');document.getElementById('products').style.display='block';})();">Products</button>
        <button data-tab="license" onclick="(function(){document.querySelectorAll('.tab').forEach(t=>t.style.display='none');document.getElementById('license').style.display='block';})();">Use Key</button>
        <button data-tab="news" onclick="(function(){document.querySelectorAll('.tab').forEach(t=>t.style.display='none');document.getElementById('news').style.display='block';})();">News</button>
      </nav>
    </aside>

    <main class="main" role="main">
      <section id="user" class="tab" style="display:block">
        <h2>User Profile</h2>
        <div class="card">
          <p><strong>Welcome</strong> <span id="usernameDisplay">—</span></p>
          <p><strong>Email</strong> <span id="emailDisplay">—</span></p>
          <p><strong>Status</strong> Active</p>
          <div style="margin-top:12px">
            <button id="logoutBtn" class="btn danger"
              onclick="
                (function(){
                  try{ localStorage.removeItem('profile'); }catch(e){}
                  document.getElementById('dashboard').style.display='none';
                  document.getElementById('loginScreen').style.display='flex';
                })();
              ">Logout</button>
          </div>
        </div>
      </section>

      <section id="products" class="tab" style="display:none">
        <h2>Your Products</h2>
        <div id="productsContainer" class="card">No products yet.</div>
      </section>

      <section id="license" class="tab" style="display:none">
        <h2>Redeem License</h2>
        <div class="card">
          <input id="licenseKey" type="text" placeholder="XXXXX-XXXXX-XXXXX" style="width:100%;padding:8px;border-radius:6px;border:1px solid #222;background:#0b0b0d;color:#e6eef6" />
          <div style="margin-top:8px">
            <button class="btn primary" onclick="(function(){ var k=document.getElementById('licenseKey').value.trim(); if(!k){ alert('Enter a key'); return; } alert('Stored locally: '+k); })()">Activate Key</button>
          </div>
        </div>
      </section>

      <section id="news" class="tab" style="display:none">
        <h2>Latest News</h2>
        <div class="card">No news.</div>
      </section>
    </main>
  </div>
</body>
</html>
