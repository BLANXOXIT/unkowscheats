<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login then Dashboard Demo</title>
  <style>
    :root{--bg:#070708;--panel:#0f1113;--card:#141518;--muted:#9aa0a6;--accent:#ff7a7a;--text:#e6eef6}
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,var(--bg),#0b0b0d);color:var(--text)}
    /* Centered login */
    #loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
    .login-box{width:340px;background:var(--panel);padding:28px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.6);text-align:center}
    .login-box h2{margin:0 0 14px;font-size:20px}
    .login-box input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #222;background:#0b0b0d;color:var(--text)}
    .primary{background:linear-gradient(90deg,#ffb86b,#ff7a7a);border:0;color:#0b0b0d;padding:10px 12px;border-radius:8px;cursor:pointer}
    .muted{color:var(--muted);font-size:13px;margin-top:8px}
    .hidden{display:none}
    /* Dashboard */
    #dashboard{display:flex;min-height:100vh}
    .sidebar{width:220px;padding:20px;background:var(--panel);box-shadow:2px 0 30px rgba(0,0,0,.6)}
    .sidebar h2{margin:0 0 18px;font-size:18px}
    .sidebar nav button{display:block;width:100%;margin:8px 0;padding:10px;border-radius:8px;border:0;background:#111;color:var(--text);text-align:left;cursor:pointer}
    .main{flex:1;padding:28px;overflow:auto}
    .card{background:var(--card);padding:14px;border-radius:10px;margin-bottom:12px;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="loginScreen" role="dialog" aria-labelledby="loginTitle">
    <div class="login-box" role="form" aria-labelledby="loginTitle">
      <h2 id="loginTitle">Login</h2>
      <input id="loginUsername" type="text" placeholder="Username" autocomplete="username" />
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" />
      <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="loginBtn" class="primary">Let's go!</button>
      <div id="loginError" class="muted" aria-live="polite"></div>
    </div>
  </div>

  <!-- DASHBOARD hidden until login -->
  <div id="dashboard" class="hidden" role="application" aria-hidden="true">
    <aside class="sidebar" role="navigation" aria-label="Main">
      <h2>Yeageth</h2>
      <nav>
        <button data-tab="user">User</button>
        <button data-tab="products">Products</button>
        <button data-tab="license">Use Key</button>
      </nav>
    </aside>

    <main class="main" role="main">
      <section id="user" class="tab">
        <h2>User Profile</h2>
        <div class="card">
          <p><strong>Welcome</strong> <span id="usernameDisplay">—</span></p>
          <p><strong>Email</strong> <span id="emailDisplay">—</span></p>
          <p><strong>Status</strong> <span id="statusDisplay">Active</span></p>
          <div style="margin-top:12px"><button id="logoutBtn" class="primary">Logout</button></div>
        </div>
      </section>

      <section id="products" class="tab hidden">
        <h2>Your Products</h2>
        <div id="productsContainer" class="card">No products yet.</div>
      </section>

      <section id="license" class="tab hidden">
        <h2>Redeem License</h2>
        <form id="licenseForm" class="card">
          <input id="licenseKey" type="text" placeholder="XXXXX-XXXXX-XXXXX" />
          <button type="submit" class="primary">Activate Key</button>
          <div id="licenseStatus" class="muted"></div>
        </form>
      </section>
    </main>
  </div>

  <script>
    // This script waits for DOM and logs everything so you can see what's happening
    document.addEventListener('DOMContentLoaded', function () {
      console.log('DOM ready');

      const ids = ['loginBtn','loginUsername','loginEmail','loginPassword','loginScreen','dashboard','usernameDisplay','emailDisplay','logoutBtn'];
      const exist = ids.map(id => [id, !!document.getElementById(id)]);
      console.log('Element existence check:', exist);

      const loginBtn = document.getElementById('loginBtn');
      const loginScreen = document.getElementById('loginScreen');
      const dashboard = document.getElementById('dashboard');
      const usernameInput = document.getElementById('loginUsername');
      const emailInput = document.getElementById('loginEmail');
      const passwordInput = document.getElementById('loginPassword');
      const usernameDisplay = document.getElementById('usernameDisplay');
      const emailDisplay = document.getElementById('emailDisplay');
      const logoutBtn = document.getElementById('logoutBtn');

      if (!loginBtn) {
        console.error('loginBtn not found. Check HTML ids and that this file is the one loaded.');
        return;
      }

      // Attach handler and confirm in console
      loginBtn.addEventListener('click', function () {
        console.log('loginBtn clicked');
        const u = usernameInput.value.trim();
        const e = emailInput.value.trim();
        const p = passwordInput.value.trim();
        console.log('input values', {u,e,p});
        if (!u || !e || !p) {
          document.getElementById('loginError').textContent = 'Fill all fields';
          console.warn('Missing fields');
          return;
        }
        // Save profile and show dashboard
        try { localStorage.setItem('profile', JSON.stringify({username:u,email:e,status:'Active'})); } catch (err) { console.warn('localStorage failed', err); }
        loginScreen.classList.add('hidden');
        dashboard.classList.remove('hidden');
        dashboard.setAttribute('aria-hidden','false');
        usernameDisplay.textContent = u;
        emailDisplay.textContent = e;
        console.log('Dashboard shown');
      });

      // Logout
      logoutBtn.addEventListener('click', function () {
        console.log('logout clicked');
        localStorage.removeItem('profile');
        dashboard.classList.add('hidden');
        loginScreen.classList.remove('hidden');
      });

      // Simple tab switching
      document.querySelectorAll('.sidebar nav button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
          const id = btn.dataset.tab;
          const el = document.getElementById(id);
          if (el) el.classList.remove('hidden');
        });
      });

      // Auto-show dashboard if profile exists
      try {
        const stored = JSON.parse(localStorage.getItem('profile') || 'null');
        if (stored && stored.username) {
          console.log('Found stored profile, auto-showing dashboard for', stored.username);
          usernameDisplay.textContent = stored.username;
          emailDisplay.textContent = stored.email || '';
          loginScreen.classList.add('hidden');
          dashboard.classList.remove('hidden');
        }
      } catch (err) { console.warn('Error reading stored profile', err); }
    });
  </script>
</body>
</html>
